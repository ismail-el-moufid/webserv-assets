timeout 30;

server
{
	listen localhost 8080;
	serverName server1;
	clientMaxBodySize 1048576;
	errorPage 404 "/Users/isel-mou/webserv/test_webserv's html/404.html";
	errorPage 400 "/Users/isel-mou/webserv/test_webserv's html/400.html";
	errorPage 403 "/Users/isel-mou/webserv/test_webserv's html/403.html";
	errorPage 405 "/Users/isel-mou/webserv/test_webserv's html/405.html";
	errorPage 413 "/Users/isel-mou/webserv/test_webserv's html/413.html";
	errorPage 500 "/Users/isel-mou/webserv/test_webserv's html/500.html";

	location /upload
	{
		clientMaxBodySize 10485760;
		upload /uploads;
		allowedMethods POST;
	}

	location /obsoleteUrl
	{
		redirect 301 /;
	}

	location /cgi
	{
		root "/Users/isel-mou/.local/webserv";
		cgi .py /usr/local/bin/python3;
		allowedMethods GET POST;
	}

	location /
	{
		root "/Users/isel-mou/webserv/test_webserv's html/";
		index welcome.html;
		autoIndex on;
		allowedMethods GET POST;
	}
}

